<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เหตุผลงานไม่ติดตั้ง | BB Weekly 2026</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="theme-color" content="#0f172a">
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f8fafc; color: #0f172a; }
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        .field-label { display: block; margin-bottom: 0.5rem; font-size: 0.82rem; font-weight: 800; color: #334155; }
        .field-input { width: 100%; min-height: 52px; border: 1px solid #cbd5e1; border-radius: 8px; background: #fff; padding: 0.85rem 0.95rem; font-weight: 700; outline: none; transition: border-color 0.15s ease, box-shadow 0.15s ease; }
        .field-input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14); }
        .panel { border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; }
        .status { border-radius: 8px; padding: 0.875rem 1rem; font-weight: 800; }
        .status.info { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
        .status.success { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
        .status.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .page-shell { width: min(100% - 2rem, 1400px); margin: 0 auto; }
        .page-layout { display: grid; gap: 1.25rem; grid-template-columns: minmax(0, 1fr); }
        #reason { min-height: 280px; }
        .entry-grid { display: grid; gap: 1rem; }
        #recent-list { overflow-y: auto; }
        @media (min-width: 768px) {
            .entry-grid { grid-template-columns: minmax(280px, 360px) minmax(200px, 260px) 200px; align-items: start; }
        }
        @media (min-width: 1280px) {
            .page-layout { grid-template-columns: minmax(0, 1fr) 480px; align-items: start; }
            .entry-grid { grid-template-columns: 360px 240px 190px; }
            .aside-panel { display: flex; flex-direction: column; }
            #recent-list { max-height: calc(100vh - 220px); overflow-y: auto; }
        }
    </style>
</head>
<body class="min-h-screen">
    <header class="border-b border-slate-200 bg-white">
        <div class="page-shell flex flex-col gap-4 py-4 sm:flex-row sm:items-center sm:justify-between">
            <div class="flex items-center gap-3">
                <div class="flex h-11 w-11 items-center justify-center rounded-lg bg-slate-900 text-base font-black text-white">BB</div>
                <div>
                    <h1 class="text-xl font-black tracking-tight text-slate-950">เหตุผลงานไม่ติดตั้ง</h1>
                    <p class="text-sm font-bold text-slate-500">Goodfilm Mgmt (2019-2026)</p>
                </div>
            </div>
            <div class="flex flex-wrap gap-2">
                <a class="inline-flex items-center gap-2 rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-black text-slate-700 hover:bg-slate-50" href="index.html">
                    <i data-lucide="layout-dashboard" class="h-4 w-4"></i>
                    Dashboard
                </a>
                <a class="inline-flex items-center gap-2 rounded-lg bg-slate-900 px-4 py-2 text-sm font-black text-white hover:bg-slate-800" target="_blank" rel="noopener noreferrer" href="https://docs.google.com/spreadsheets/d/12BRnIWVT227cltrdeukIAOIEJ_qrL3OH0Aw6a7gIDIo/edit?gid=1908699919#gid=1908699919">
                    <i data-lucide="table-2" class="h-4 w-4"></i>
                    Google Sheet
                </a>
            </div>
        </div>
    </header>

    <main class="page-shell page-layout py-5">
        <section class="panel p-4 sm:p-6">
            <div class="mb-5 border-b border-slate-200 pb-4">
                <p class="text-xs font-black uppercase tracking-widest text-blue-600">Data Entry</p>
                <h2 class="mt-1 text-2xl font-black text-slate-950">บันทึกรายการใหม่</h2>
            </div>

            <form id="entry-form" class="grid gap-5">
                <input type="hidden" id="entry-id" name="id">
                <input type="hidden" id="record-date" name="recordDate">

                <div class="entry-grid">
                    <div>
                        <label class="field-label" for="week">Week</label>
                        <select class="field-input" id="week" name="week" required></select>
                        <p id="week-date-range" class="mt-2 text-sm font-bold text-slate-500">กำลังโหลดช่วงวันที่...</p>
                    </div>
                    <div>
                        <label class="field-label" for="sales-owner">ฝ่ายขาย</label>
                        <input class="field-input" id="sales-owner" name="salesOwner" list="sales-owner-list" autocomplete="off" placeholder="เลือกหรือพิมพ์ชื่อฝ่ายขาย" required>
                        <datalist id="sales-owner-list">
                            <option value="บอม"></option>
                            <option value="เจ"></option>
                            <option value="สายฟ้า"></option>
                            <option value="แพท"></option>
                            <option value="อิมเมจ"></option>
                            <option value="ยา"></option>
                            <option value="ตัง"></option>
                            <option value="ตุ๊กตา"></option>
                        </datalist>
                    </div>
                    <div>
                        <label class="field-label" for="no-install-count">จำนวนงานไม่ติดตั้ง</label>
                        <input class="field-input" id="no-install-count" name="noInstallCount" type="number" min="1" step="1" inputmode="numeric" placeholder="0" required>
                    </div>
                </div>

                <div class="max-w-5xl">
                    <label class="field-label" for="reason">อธิบายเหตุผลที่งานไม่ติดตั้ง</label>
                    <textarea class="field-input resize-y text-base leading-7" id="reason" name="reason" placeholder="ระบุเหตุผลที่งานไม่ติดตั้งให้ละเอียด" required></textarea>
                </div>

                <div id="status-box" class="status info hidden"></div>

                <div id="edit-banner" class="hidden rounded-lg border border-amber-200 bg-amber-50 px-4 py-2.5 text-sm font-bold text-amber-800 flex items-center gap-2">
                    <i data-lucide="pencil" class="h-4 w-4 shrink-0"></i>
                    <span>กำลังแก้ไขรายการ: <span id="edit-id-label" class="font-black"></span></span>
                    <button type="button" id="cancel-edit" class="ml-auto rounded px-2 py-0.5 text-amber-700 hover:bg-amber-200 font-black">ยกเลิก</button>
                </div>

                <div class="flex flex-col gap-3 border-t border-slate-200 pt-5 sm:flex-row sm:items-center sm:justify-between">
                    <button type="button" id="reset-button" class="inline-flex items-center justify-center gap-2 rounded-lg border border-slate-300 bg-white px-5 py-3 font-black text-slate-700 hover:bg-slate-50">
                        <i data-lucide="rotate-ccw" class="h-5 w-5"></i>
                        ล้างฟอร์ม
                    </button>
                    <button type="submit" id="submit-btn" class="inline-flex items-center justify-center gap-2 rounded-lg bg-blue-600 px-6 py-3 font-black text-white shadow-lg shadow-blue-600/20 hover:bg-blue-700">
                        <i data-lucide="send" class="h-5 w-5"></i>
                        บันทึกลงชีต
                    </button>
                </div>
            </form>
        </section>

        <aside class="xl:sticky xl:top-5 aside-panel">
            <section class="panel p-4 flex flex-col" style="max-height:calc(100vh - 5rem);min-height:0">
                <div class="mb-3 flex items-center justify-between gap-3">
                    <h2 class="text-base font-black text-slate-950">รายการล่าสุด</h2>
                    <button type="button" id="refresh-recent" class="rounded-lg border border-slate-300 p-2 text-slate-600 hover:bg-slate-50" title="รีเฟรช">
                        <i data-lucide="refresh-cw" class="h-4 w-4"></i>
                    </button>
                </div>
                <div class="flex gap-2 mb-3">
                    <select id="filter-rep" class="flex-1 rounded-lg border border-slate-200 bg-slate-50 px-2 py-1.5 text-xs font-bold text-slate-700 focus:outline-none focus:border-blue-400">
                        <option value="">ทุกฝ่ายขาย</option>
                        <option>บอม</option><option>เจ</option><option>สายฟ้า</option>
                        <option>แพท</option><option>อิมเมจ</option><option>ยา</option>
                        <option>ตัง</option><option>ตุ๊กตา</option>
                    </select>
                    <select id="filter-week" class="flex-1 rounded-lg border border-slate-200 bg-slate-50 px-2 py-1.5 text-xs font-bold text-slate-700 focus:outline-none focus:border-blue-400">
                        <option value="">ทุก Week</option>
                    </select>
                </div>
                <div id="recent-list" class="space-y-3 text-sm overflow-y-auto flex-1 min-h-0"></div>
            </section>
        </aside>
    </main>

    <script>
        const SPREADSHEET_ID = '12BRnIWVT227cltrdeukIAOIEJ_qrL3OH0Aw6a7gIDIo';
        const SHEET_GID = '1908699919';
        const WEEK_SOURCE_GID = '702501167';
        const SHEET_NAME = 'เหตุผลงานไม่ติดตั้ง';
        const SCRIPT_URL_KEY = 'bb-no-install-reason-script-url';
        const CACHE_RECENT_KEY = 'bb-no-install-recent';
        const CACHE_WEEKS_KEY = 'bb-no-install-weeks';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwv8e_8xz8SHhVTkkgF9zTWxBtqh5d1UAgCkh1-k3-MWXzn4-OiUng3ZelwFkmdtdJY/exec';

        const form = document.getElementById('entry-form');
        const idInput = document.getElementById('entry-id');
        const dateInput = document.getElementById('record-date');
        const weekInput = document.getElementById('week');
        const weekDateRange = document.getElementById('week-date-range');
        const statusBox = document.getElementById('status-box');
        const recentList = document.getElementById('recent-list');
        let weekOptions = [];
        let latestRows = [];
        let isEditMode = false;

        function pad(value) {
            return String(value).padStart(2, '0');
        }

        function todayISO() {
            const now = new Date();
            return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
        }

        function createEntryId() {
            const now = new Date();
            const stamp = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
            return `NIR-${stamp}-${Math.random().toString(36).slice(2, 6).toUpperCase()}`;
        }

        function getWeekLabel(dateValue) {
            const date = dateValue ? new Date(`${dateValue}T00:00:00`) : new Date();
            const firstDay = new Date(date.getFullYear(), 0, 1);
            const pastDays = Math.floor((date - firstDay) / 86400000);
            return `Week ${Math.ceil((pastDays + firstDay.getDay() + 1) / 7)}`;
        }

        function cleanNumber(value) {
            const numeric = String(value || '').replace(/[^\d.-]/g, '');
            return Number(numeric) || 0;
        }

        function startOfToday() {
            const today = new Date();
            return new Date(today.getFullYear(), today.getMonth(), today.getDate());
        }

        function parseThaiDateEnd(dateRange) {
            const months = {
                'ม.ค.': 0, 'ก.พ.': 1, 'มี.ค.': 2, 'เม.ย.': 3, 'พ.ค.': 4, 'มิ.ย.': 5,
                'ก.ค.': 6, 'ส.ค.': 7, 'ก.ย.': 8, 'ต.ค.': 9, 'พ.ย.': 10, 'ธ.ค.': 11,
                'ม.ค': 0, 'ก.พ': 1, 'มี.ค': 2, 'เม.ย': 3, 'พ.ค': 4, 'มิ.ย': 5,
                'ก.ค': 6, 'ส.ค': 7, 'ก.ย': 8, 'ต.ค': 9, 'พ.ย': 10, 'ธ.ค': 11
            };
            const matches = [...String(dateRange || '').matchAll(/(\d{1,2})\s*([^\s–-]+)/g)]
                .map(match => ({
                    day: Number(match[1]),
                    month: String(match[2] || '').replace(/[^\u0E00-\u0E7F.]/g, '')
                }))
                .filter(item => months[item.month] !== undefined);

            if (!matches.length) return null;
            const end = matches[matches.length - 1];
            return new Date(new Date().getFullYear(), months[end.month], end.day);
        }

        function isWeekAvailable(dateRange) {
            const endDate = parseThaiDateEnd(dateRange);
            return endDate ? endDate <= startOfToday() : true;
        }

        function populateWeeks() {
            const options = weekOptions.length
                ? weekOptions
                : Array.from({ length: 53 }, (_, index) => ({ week: `Week ${index + 1}`, dateRange: '' }));

            weekInput.innerHTML = options.map(item => {
                const label = item.dateRange ? `${item.week} (${item.dateRange})` : item.week;
                return `<option value="${escapeHTML(item.week)}" data-date-range="${escapeHTML(item.dateRange)}">${escapeHTML(label)}</option>`;
            }).join('');
            updateWeekDateRange();
        }

        function normalizeWeek(value) {
            const match = String(value || '').match(/week\s*(\d+)/i);
            return match ? `Week ${Number(match[1])}` : String(value || '').trim();
        }

        function getSelectedWeekOption() {
            return weekInput.options[weekInput.selectedIndex];
        }

        function updateWeekDateRange() {
            const option = getSelectedWeekOption();
            const dateRange = option?.dataset?.dateRange || '';
            weekDateRange.textContent = dateRange ? `ช่วงวันที่: ${dateRange}` : 'ยังไม่มีช่วงวันที่ของ Week นี้';
        }

        function getWeekOptionsFromCSV(parsed) {
            const rowBased = parsed
                .filter(row => /^week\s*\d+/i.test(String(row[0] || '').trim()))
                .map(row => ({
                    week: normalizeWeek(row[0]),
                    dateRange: String(row[1] || '').trim(),
                    dashboardScore: isWeekAvailable(row[1])
                        ? cleanNumber(row[11]) + cleanNumber(row[12]) + cleanNumber(row[13])
                        : 0
                }))
                .filter(item => item.week);

            if (rowBased.length) return rowBased;

            if (!parsed[1]) return [];
            const colBased = [];
            for (let index = 0; index < parsed[1].length; index += 1) {
                const week = normalizeWeek(parsed[1][index]);
                if (!/^Week \d+$/i.test(week)) continue;
                colBased.push({
                    week,
                    dateRange: String(parsed[2]?.[index] || '').trim(),
                    dashboardScore: cleanNumber(parsed[8]?.[index])
                });
            }
            return colBased;
        }

        function selectDashboardDefaultWeek() {
            const defaultWeek = [...weekOptions].reverse().find(item => item.dashboardScore > 0)?.week;
            if (defaultWeek && [...weekInput.options].some(option => option.value === defaultWeek)) {
                weekInput.value = defaultWeek;
                updateWeekDateRange();
            }
        }

        async function loadWeekOptions() {
            // Show cache immediately
            try {
                const cached = localStorage.getItem(CACHE_WEEKS_KEY);
                if (cached) {
                    weekOptions = JSON.parse(cached);
                    if (weekOptions.length) { populateWeeks(); selectDashboardDefaultWeek(); }
                }
            } catch (_) {}

            // Fetch fresh in background
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${WEEK_SOURCE_GID}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Cannot load week ranges');
                const fresh = getWeekOptionsFromCSV(parseCSV(await response.text()));
                if (fresh.length) {
                    localStorage.setItem(CACHE_WEEKS_KEY, JSON.stringify(fresh));
                    weekOptions = fresh;
                    populateWeeks();
                    selectDashboardDefaultWeek();
                }
            } catch (error) {
                if (!weekOptions.length) weekDateRange.textContent = 'โหลดช่วงวันที่ไม่สำเร็จ';
            }
        }

        function setStatus(type, message) {
            statusBox.className = `status ${type}`;
            statusBox.textContent = message;
            statusBox.classList.remove('hidden');
        }

        function clearStatus() {
            statusBox.classList.add('hidden');
            statusBox.textContent = '';
        }

        function getScriptUrl() {
            return SCRIPT_URL || localStorage.getItem(SCRIPT_URL_KEY) || '';
        }

        function rememberScriptUrlFromQuery() {
            const params = new URLSearchParams(window.location.search);
            const scriptUrl = params.get('scriptUrl');
            if (!scriptUrl) return;
            localStorage.setItem(SCRIPT_URL_KEY, scriptUrl);
            params.delete('scriptUrl');
            const cleanQuery = params.toString();
            const cleanUrl = `${window.location.pathname}${cleanQuery ? `?${cleanQuery}` : ''}${window.location.hash}`;
            window.history.replaceState({}, '', cleanUrl);
        }

        function parseCSV(text) {
            const rows = [];
            let row = [];
            let cell = '';
            let inQuotes = false;
            for (let i = 0; i < text.length; i += 1) {
                const char = text[i];
                const next = text[i + 1];
                if (char === '"' && inQuotes && next === '"') {
                    cell += '"';
                    i += 1;
                } else if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    row.push(cell);
                    cell = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && next === '\n') i += 1;
                    row.push(cell);
                    rows.push(row);
                    row = [];
                    cell = '';
                } else {
                    cell += char;
                }
            }
            row.push(cell);
            rows.push(row);
            return rows.filter(item => item.some(value => value.trim() !== ''));
        }

        function escapeHTML(value) {
            return String(value || '').replace(/[&<>"']/g, char => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[char]));
        }

        let allRows = [];

        function renderRecentList() {
            const repFilter = document.getElementById('filter-rep').value;
            const weekFilter = document.getElementById('filter-week').value;
            let rows = allRows;
            if (repFilter) rows = rows.filter(r => String(r[3] || '').trim() === repFilter);
            if (weekFilter) rows = rows.filter(r => String(r[2] || '').trim() === weekFilter);
            if (rows.length === 0) {
                recentList.innerHTML = '<p class="font-bold text-slate-500">ไม่พบรายการ</p>';
                latestRows = [];
                return;
            }
            latestRows = rows;
            recentList.innerHTML = rows.map((row, idx) => `
                <article data-idx="${idx}" class="rounded-lg border border-slate-200 bg-slate-50 p-3 cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-colors" title="คลิกเพื่อแก้ไข">
                    <div class="mb-2 flex items-start justify-between gap-3">
                        <p class="font-black text-slate-900">${escapeHTML(row[3] || '-')}</p>
                        <span class="rounded-md bg-white px-2 py-1 text-xs font-black text-blue-700">${escapeHTML(row[2] || '-')}</span>
                    </div>
                    <p class="text-xs font-bold text-slate-500">${escapeHTML(row[1] || '-')} · ${escapeHTML(row[4] || '0')} งาน</p>
                    <p class="mt-2 font-bold leading-6 text-slate-700" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${escapeHTML(row[5] || '-')}</p>
                </article>
            `).join('');
            recentList.querySelectorAll('article[data-idx]').forEach(card => {
                card.addEventListener('click', () => populateFormForEdit(latestRows[Number(card.dataset.idx)]));
            });
        }

        function applyRecentRows(rows) {
            allRows = rows;
            const weeks = [...new Set(rows.map(r => String(r[2] || '').trim()).filter(Boolean))];
            const weekSelect = document.getElementById('filter-week');
            const currentWeek = weekSelect.value;
            weekSelect.innerHTML = '<option value="">ทุก Week</option>' +
                weeks.map(w => `<option${w === currentWeek ? ' selected' : ''}>${escapeHTML(w)}</option>`).join('');
            renderRecentList();
        }

        async function loadRecentEntries() {
            // Show cache immediately
            try {
                const cached = localStorage.getItem(CACHE_RECENT_KEY);
                if (cached) {
                    applyRecentRows(JSON.parse(cached));
                } else {
                    recentList.innerHTML = '<p class="font-bold text-slate-500">กำลังโหลด...</p>';
                }
            } catch (_) {}

            // Fetch fresh in background
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${SHEET_GID}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Cannot load recent rows');
                const rows = parseCSV(await response.text()).slice(1).filter(row => row.some(Boolean))
                    .sort((a, b) => {
                        const wa = parseInt(String(a[2] || '').match(/\d+/)?.[0] || '0');
                        const wb = parseInt(String(b[2] || '').match(/\d+/)?.[0] || '0');
                        return wb - wa;
                    });
                localStorage.setItem(CACHE_RECENT_KEY, JSON.stringify(rows));
                applyRecentRows(rows);
            } catch (error) {
                if (!allRows.length) recentList.innerHTML = '<p class="font-bold text-red-600">โหลดรายการล่าสุดไม่สำเร็จ</p>';
            }
        }

        function setEditMode(on, row) {
            isEditMode = on;
            const banner = document.getElementById('edit-banner');
            const submitBtn = document.getElementById('submit-btn');
            if (on) {
                banner.classList.remove('hidden');
                document.getElementById('edit-id-label').textContent = row ? row[0] : idInput.value;
                submitBtn.innerHTML = '<i data-lucide="save" class="h-5 w-5"></i> บันทึกการแก้ไข';
                submitBtn.classList.replace('bg-blue-600', 'bg-amber-600');
                submitBtn.classList.replace('hover:bg-blue-700', 'hover:bg-amber-700');
                submitBtn.classList.replace('shadow-blue-600/20', 'shadow-amber-600/20');
                lucide.createIcons();
            } else {
                banner.classList.add('hidden');
                submitBtn.innerHTML = '<i data-lucide="send" class="h-5 w-5"></i> บันทึกลงชีต';
                submitBtn.classList.replace('bg-amber-600', 'bg-blue-600');
                submitBtn.classList.replace('hover:bg-amber-700', 'hover:bg-blue-700');
                submitBtn.classList.replace('shadow-amber-600/20', 'shadow-blue-600/20');
                lucide.createIcons();
            }
        }

        function populateFormForEdit(row) {
            idInput.value = row[0] || '';
            dateInput.value = row[1] || todayISO();
            if (row[2]) { weekInput.value = row[2]; updateWeekDateRange(); }
            document.getElementById('sales-owner').value = row[3] || '';
            document.getElementById('no-install-count').value = row[4] || '';
            document.getElementById('reason').value = row[5] || '';
            clearStatus();
            setEditMode(true, row);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            form.reset();
            idInput.value = createEntryId();
            dateInput.value = todayISO();
            weekInput.value = getWeekLabel(dateInput.value);
            updateWeekDateRange();
            clearStatus();
            setEditMode(false);
        }

        async function submitEntry(event) {
            event.preventDefault();
            clearStatus();

            const scriptUrl = getScriptUrl();
            if (!scriptUrl) {
                setStatus('error', 'ยังไม่ได้ตั้งค่า Web App URL สำหรับเชื่อมต่อ Apps Script');
                return;
            }

            const payload = {
                action: isEditMode ? 'update' : 'create',
                sheetName: SHEET_NAME,
                id: idInput.value,
                recordDate: dateInput.value,
                week: weekInput.value,
                salesOwner: document.getElementById('sales-owner').value.trim(),
                noInstallCount: Number(document.getElementById('no-install-count').value),
                reason: document.getElementById('reason').value.trim()
            };

            if (!payload.salesOwner || payload.noInstallCount === '' || isNaN(payload.noInstallCount) || !payload.reason) {
                setStatus('error', 'กรุณากรอกข้อมูลที่จำเป็นให้ครบ');
                return;
            }

            setStatus('info', 'กำลังส่งข้อมูล...');
            try {
                await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const wasEditing = isEditMode;
                resetForm();
                setStatus('success', wasEditing ? 'แก้ไขเรียบร้อยแล้ว' : 'บันทึกเรียบร้อยแล้ว');
                setTimeout(clearStatus, 3000);
                setTimeout(loadRecentEntries, 1500);
            } catch (error) {
                setStatus('error', 'ส่งข้อมูลไม่สำเร็จ กรุณาตรวจสอบสิทธิ์ของ Apps Script');
            }
        }

        rememberScriptUrlFromQuery();
        populateWeeks();
        resetForm();
        loadWeekOptions();
        loadRecentEntries();

        // Auto-populate form from URL ?id= parameter
        (async function checkUrlId() {
            const urlId = new URLSearchParams(window.location.search).get('id');
            if (!urlId) return;
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${SHEET_GID}`;
                const res = await fetch(url);
                if (!res.ok) return;
                const rows = parseCSV(await res.text()).slice(1).filter(r => r.some(Boolean));
                const target = rows.find(r => String(r[0] || '').trim() === urlId.trim());
                if (target) { await new Promise(resolve => setTimeout(resolve, 800)); populateFormForEdit(target); }
            } catch(_) {}
        })();

        weekInput.addEventListener('change', updateWeekDateRange);
        form.addEventListener('submit', submitEntry);
        document.getElementById('reset-button').addEventListener('click', resetForm);
        document.getElementById('cancel-edit').addEventListener('click', resetForm);
        document.getElementById('refresh-recent').addEventListener('click', loadRecentEntries);
        document.getElementById('filter-rep').addEventListener('change', renderRecentList);
        document.getElementById('filter-week').addEventListener('change', renderRecentList);

        lucide.createIcons();
    </script>
</body>
</html>
